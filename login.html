<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#23433c" />
  <title>By Rafael Hanson - Login</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --surface: rgba(15, 31, 34, 0.75);
      --text: #e4f0ea;
      --muted: #93b1a8;
      --pine: #9fe0c4;
      --accent: #e86c39;
      --border: rgba(39, 68, 63, 0.4);
      --radius: 28px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at 10% -10%, #1e4a4f 0%, #14363e 36%, #0d2a31 62%, #0b1d23 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("./rafael-road-2.jpg") center center/cover no-repeat;
      opacity: 0.25;
      z-index: -2;
      pointer-events: none;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(10, 24, 30, 0.42), rgba(10, 24, 30, 0.72));
      z-index: -1;
      pointer-events: none;
    }
    .wrap {
      width: min(420px, 100%);
      position: relative;
      z-index: 1;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.45), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      color: #e4f0ea;
    }
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .login-logo {
      width: 200px;
      max-width: 100%;
      height: auto;
      filter: invert(1);
      mix-blend-mode: screen;
      display: block;
    }
    p {
      color: #b8d4cc;
      margin: 0 0 28px;
      font-size: 0.95rem;
      line-height: 1.5;
      text-align: center;
    }
    label {
      display: block;
      font-weight: 700;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      color: var(--pine);
      opacity: 0.85;
    }
    input {
      width: 100%;
      border: 1px solid rgba(121, 177, 155, 0.2);
      background: rgba(13, 34, 31, 0.4);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 1rem;
      color: #fff;
      margin-bottom: 20px;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }
    input::placeholder { color: rgba(159, 224, 196, 0.45); }
    input:focus {
      outline: none;
      border-color: rgba(134, 209, 165, 0.5);
      background: rgba(13, 34, 31, 0.6);
      box-shadow: 0 0 0 4px rgba(134, 209, 165, 0.1);
    }
    .row {
      display: flex;
      gap: 12px;
      margin-top: 4px;
    }
    button {
      flex: 1;
      border: 0;
      border-radius: 16px;
      padding: 14px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      font-family: 'Inter', sans-serif;
    }
    .primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 24px rgba(232, 108, 57, 0.3);
    }
    .primary:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(232, 108, 57, 0.4); filter: brightness(1.1); }
    .ghost {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e4f0ea;
    }
    .ghost:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
    .msg {
      margin-top: 16px;
      font-size: 0.88rem;
      font-weight: 500;
      text-align: center;
      padding: 10px;
      border-radius: 12px;
    }
    .ok { background: rgba(15, 122, 73, 0.2); color: #72d39a; border: 1px solid rgba(15, 122, 73, 0.3); }
    .err { background: rgba(157, 42, 42, 0.2); color: #f87171; border: 1px solid rgba(157, 42, 42, 0.3); }
    .top-note {
      padding: 14px;
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 16px;
      background: rgba(59, 130, 246, 0.1);
      font-size: 0.82rem;
      color: #93c5fd;
      margin-bottom: 24px;
      line-height: 1.4;
    }
    code { font-family: monospace; background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; }
    .lp-link {
      margin-top: 20px;
      text-align: center;
    }
    .lp-link a {
      display: inline-block;
      min-width: 100%;
      text-align: center;
      color: #e9fff5;
      font: 700 0.92rem/1 Inter, sans-serif;
      text-decoration: none;
      border: 1px solid rgba(159, 224, 196, 0.35);
      background: rgba(16, 37, 33, 0.75);
      border-radius: 14px;
      padding: 13px 14px;
      transition: all .2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,.22);
    }
    .lp-link a:hover {
      transform: translateY(-1px);
      border-color: rgba(159, 224, 196, 0.65);
      background: rgba(19, 49, 43, 0.9);
      box-shadow: 0 12px 26px rgba(0,0,0,.28);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="logo-wrap">
        <img src="./logo.png.jpg" alt="Viagens Cafés e Fotos" class="login-logo">
      </div>
      <p>Entre ou crie sua conta para planejar.</p>

      <div id="configWarn" class="top-note" hidden>
        Atenção: Configure as chaves do Supabase no arquivo <code>auth-config.js</code> para habilitar o login.
      </div>

      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="seu@email.com" autocomplete="email">
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input id="password" type="password" placeholder="Sua senha">
      </div>

      <div id="signupFields" style="display: none;">
        <label for="confirmPassword">Confirmar senha</label>
        <input id="confirmPassword" type="password" placeholder="Repita sua senha">
      </div>

      <div class="row">
        <button id="loginBtn" class="primary">Entrar</button>
        <button id="toggleSignupBtn" class="ghost">Criar conta</button>
      </div>

      <div id="msg" class="msg" hidden></div>
    </section>

    <div class="lp-link">
      <a id="landingLink" href="./landing/index.html">Conhe&ccedil;a o Guia Completo Patag&ocirc;nia</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js"></script>
  <script src="./auth.js"></script>
  <script>
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const confirmPasswordEl = document.getElementById("confirmPassword");
    const loginBtn = document.getElementById("loginBtn");
    const msgEl = document.getElementById("msg");
    const configWarnEl = document.getElementById("configWarn");
    const signupFields = document.getElementById("signupFields");
    const toggleSignupBtn = document.getElementById("toggleSignupBtn");
    let isSignupMode = false;

    function showMessage(text, type) {
      if (!text) { msgEl.hidden = true; return; }
      msgEl.textContent = text;
      msgEl.className = `msg ${type || ""}`;
      msgEl.hidden = false;
    }

    async function bootstrap() {
      if (!window.AppAuth.hasSupabaseKeys()) {
        configWarnEl.hidden = false;
      } else {
        const session = await window.AppAuth.getSession();
        if (session) window.AppAuth.redirectAfterLogin();
      }
    }

    toggleSignupBtn.addEventListener("click", () => {
      isSignupMode = !isSignupMode;
      signupFields.style.display = isSignupMode ? "block" : "none";
      loginBtn.textContent = isSignupMode ? "Registrar" : "Entrar";
      toggleSignupBtn.textContent = isSignupMode ? "Voltar ao login" : "Criar conta";
      showMessage("");
    });

    loginBtn.addEventListener("click", async () => {
      const email = emailEl.value.trim();
      const password = passwordEl.value;
      if (!email || !password) { showMessage("Por favor, preencha e-mail e senha.", "err"); return; }
      try {
        showMessage("");
        if (isSignupMode) {
          if (password !== confirmPasswordEl.value) { showMessage("As senhas não coincidem.", "err"); return; }
          await window.AppAuth.signUp(email, password);
          showMessage("Conta criada! Verifique seu e-mail e aguarde aprovação.", "ok");
        } else {
          await window.AppAuth.signIn(email, password);
        }
      } catch (error) {
        showMessage(error.message || "Ocorreu um erro. Tente novamente.", "err");
      }
    });

    (function setupLandingLink() {
      const link = document.getElementById("landingLink");
      if (!link) return;

      // Local (arquivo): usa servidor local para evitar tela branca do file:// em app React
      if (window.location.protocol === "file:") {
        link.href = "http://127.0.0.1:5500/landing/";
        return;
      }

      // Produção/deploy: abre no mesmo domínio
      link.href = "./landing/";
    })();
    bootstrap();
  </script>
</body>
</html>
