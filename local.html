<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#23433c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="By Rafael Hanson" />
  <title>By Rafael Hanson • Local da viagem</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./rafael-road-2.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07161a;
      --card: linear-gradient(180deg, #102521f2, #0d211efa);
      --card-soft: #102521;
      --text: #eaf7f1;
      --muted: #b7d3c8;
      --pine: #cfe8dd;
      --border: #2f6955a6;
      --ink: #e8f7f1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(1200px 640px at 85% 85%, rgba(76,118,96,.25), transparent 60%),
        radial-gradient(980px 520px at 8% 12%, rgba(72,125,105,.24), transparent 65%),
        var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      position: relative;
      min-height: 100vh;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:url("./assets/rafael-road-2.jpg") center center/cover no-repeat;
      z-index:-2;
      pointer-events:none;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:linear-gradient(180deg,rgba(10,24,30,.42),rgba(10,24,30,.72));
      z-index:-1;
      pointer-events:none;
    }
    .wrap { width:min(1040px,calc(100% - 24px)); margin:0 auto; padding:14px 0 26px; position:relative; z-index:1; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px; }
    .brand { font:900 clamp(1.25rem,2.8vw,2rem)/1 "Playfair Display",serif; color:var(--pine); }
    .btn {
      border: 1px solid #3a6256;
      background: #102521;
      color: var(--text);
      border-radius: 999px;
      padding: .6rem .85rem;
      font: 700 .82rem/1 Inter;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .2s ease, border-color .2s ease;
    }
    .btn:hover { background:#17362f; border-color:#568777; }
    .btn-row { display:flex; flex-wrap:wrap; gap:10px; }
    .btn-highlight { background:#ea6e3f; color:#fff; border-color:#ea6e3f; }
    .hero {
      min-height: 340px;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      align-items: end;
      padding: 18px;
      background-size: cover;
      background-position: center;
      position: relative;
      border: 1px solid var(--border);
      box-shadow: 0 12px 32px rgba(0,0,0,.28);
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.42));
      z-index:0;
    }
    .hero-c { position:relative; z-index:1; color:#fff; max-width:760px; text-shadow:0 1px 4px rgba(0,0,0,.45); }
    h1 { margin:.2rem 0 .6rem; font:900 clamp(2rem,5vw,3.2rem)/1.04 "Playfair Display",serif; }
    .chip { display:inline-block; background:#ffffff29; border:1px solid #ffffff8a; border-radius:999px; padding:.28rem .64rem; font:700 .72rem/1 Inter; text-transform:uppercase; }
    .grid { display:grid; grid-template-columns:1fr; gap:10px; margin-top:12px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,.24); }
    .article-content { color:var(--muted); line-height:1.68; }
    .article-content h3 { margin:0 0 10px; color:var(--ink); font:800 1.22rem/1.2 "Playfair Display",serif; }
    .article-content h4 { margin:0 0 8px; color:var(--ink); font:700 1rem/1.2 Inter,system-ui,sans-serif; }
    .article-content p { margin:0 0 12px; }
    .article-content ul { margin:0 0 12px; padding-left:20px; }
    .article-section { margin-bottom:20px; }
    .highlight-box { border:1px solid var(--border); border-radius:12px; background:#102521; padding:14px; }
    .stops-list { display:grid; gap:10px; }
    .stop-card { border:1px solid var(--border); border-radius:12px; padding:12px; background:#102521; }
    .stop-link { word-break:break-all; margin-top:6px; }
    .stop-link a { color:#eaf7f1; text-decoration:underline; }
    @media (min-width:900px) { .grid { grid-template-columns:1fr 1fr; } .grid .full { grid-column:1 / -1; } }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div class="brand">By Rafael Hanson</div>
      <div class="btn-row">
        <a class="btn" href="./index.html#destinos">Abrir página principal</a>
        <button id="logoutBtn" class="btn">Sair</button>
      </div>
    </div>

    <section id="hero" class="hero">
      <div class="hero-c">
        <span class="chip" id="category">local da viagem</span>
        <h1 id="title">Local da viagem</h1>
        <div class="btn-row">
          <a class="btn" id="mapsLink" href="#" target="_blank" rel="noreferrer">Abrir localização no Google Maps</a>
          <div class="btn-row" id="routeButtons"></div>
        </div>
      </div>
    </section>

    <section class="grid">
      <article class="card full">
        <div class="article-content" id="content">Carregando conteúdo...</div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js"></script>
  <script src="./auth.js"></script>
  <script>
    window.AppAuth.requireAuth().then(() => {
      if (window.AppAuth && typeof window.AppAuth.bindLogoutButton === "function") {
        window.AppAuth.bindLogoutButton("logoutBtn");
      }
      const localScript = document.createElement("script");
      localScript.src = "./local.js";
      document.body.appendChild(localScript);
    });
  </script>
  <script src="./pwa-register.js"></script>
</body>
</html>
